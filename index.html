<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>こびとAR探し</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kaisei+Opti:wght@700&family=Zen+Kurenaido&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --moss: #3a5a40;
            --bark: #344e41;
            --leaf: #588157;
            --dirt: #a3b18a;
            --fog: rgba(218, 226, 182, 0.4);
            --glow: #dad7cd;
        }

        body {
            font-family: 'Zen Kurenaido', sans-serif;
            background: #0d1a0d;
            color: #d4e8b0;
            height: 100dvh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 背景：カメラ映像 */
        #video-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        video {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* 霧のような演出 */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,20,0,0.4) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* こびと本体 */
        .kobito {
            position: absolute;
            width: 130px; /* サイズは適宜調整 */
            height: 130px;
            z-index: 10;
            cursor: pointer;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .kobito img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* UI要素 */
        #ui-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            pointer-events: none;
        }

        .counter {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(58, 90, 64, 0.8);
            padding: 10px 20px;
            border-radius: 30px;
            border: 2px solid var(--glow);
            font-size: 1.2rem;
            pointer-events: auto;
        }

        .btn-encyclopedia {
            position: absolute;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: var(--moss);
            color: var(--glow);
            border: 2px solid var(--glow);
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* 図鑑モーダル */
        #encyclopedia {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 26, 13, 0.95);
            z-index: 100;
            padding: 40px 20px;
            overflow-y: auto;
            pointer-events: auto;
        }

        .encyclopedia-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .k-card {
            background: #1a2e1a;
            border: 1px solid var(--leaf);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            filter: grayscale(1);
            opacity: 0.5;
        }

        .k-card.found {
            filter: grayscale(0);
            opacity: 1;
            border-color: var(--glow);
            background: linear-gradient(145deg, #2a4a2a, #1a2e1a);
        }

        .k-card img {
            width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 2rem;
            color: var(--glow);
        }

        /* アニメーション */
        @keyframes pop {
            0% { transform: scale(0) rotate(-10deg); }
            70% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="camera" autoplay playsinline muted></video>
    </div>
    <div id="overlay"></div>

    <div id="ui-layer">
        <div class="counter">見つけた数: <span id="count">0</span></div>
        <button class="btn-encyclopedia" onclick="openEncyclopedia()">こびと図鑑</button>
    </div>

    <div id="encyclopedia">
        <div class="close-btn" onclick="closeEncyclopedia()">×</div>
        <h2 style="text-align: center; font-family: 'Kaisei Opti'; color: var(--glow);">こびと図鑑</h2>
        <div class="encyclopedia-grid" id="grid"></div>
    </div>

    <script>
        const kobitoData = [
            { id: 1, name: "モモジリ系?", img: "IMG_4993.png" },
            { id: 2, name: "キモカワA", img: "IMG_4996.png" },
            { id: 3, name: "キモカワB", img: "IMG_4997.png" },
            { id: 4, name: "キモカワC", img: "IMG_5001.png" },
            { id: 5, name: "キモカワD", img: "IMG_5002.png" }
        ];

        let foundCount = 0;
        const foundIds = new Set();
        const video = document.getElementById('camera');
        const grid = document.getElementById('grid');

        // カメラ設定
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("カメラの許可が必要です");
            }
        }

        // 図鑑作成
        function initEncyclopedia() {
            grid.innerHTML = kobitoData.map(k => `
                <div class="k-card" id="card-${k.id}">
                    <img src="${k.img}" alt="${k.name}">
                    <div style="font-size: 0.8rem;">${k.name}</div>
                </div>
            `).join('');
        }

        // こびと出現
        function spawnKobito() {
            const data = kobitoData[Math.floor(Math.random() * kobitoData.length)];
            const el = document.createElement('div');
            el.className = 'kobito';
            el.innerHTML = `<img src="${data.img}">`;
            
            // ランダムな位置
            const x = Math.random() * (window.innerWidth - 130);
            const y = Math.random() * (window.innerHeight - 250) + 100;
            
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.animation = 'pop 0.5s ease-out';

            el.onclick = () => {
                if (!foundIds.has(data.id)) {
                    foundIds.add(data.id);
                    foundCount++;
                    document.getElementById('count').innerText = foundCount;
                    document.getElementById(`card-${data.id}`).classList.add('found');
                }
                el.style.transform = 'scale(0)';
                setTimeout(() => el.remove(), 200);
                setTimeout(spawnKobito, Math.random() * 3000 + 2000);
            };

            document.body.appendChild(el);
        }

        function openEncyclopedia() { document.getElementById('encyclopedia').style.display = 'block'; }
        function closeEncyclopedia() { document.getElementById('encyclopedia').style.display = 'none'; }

        setupCamera();
        initEncyclopedia();
        setTimeout(spawnKobito, 2000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>こびとAR観察</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kaisei+Opti:wght@700&family=Zen+Kurenaido&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Zen Kurenaido', sans-serif; background: #0d1a0d; color: #d4e8b0; height: 100dvh; overflow: hidden; }

        #video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                   background: radial-gradient(circle, transparent 40%, rgba(0,10,0,0.5) 100%); 
                   z-index: 2; pointer-events: none; }

        /* こびとの基本スタイル */
        .kobito {
            position: absolute;
            width: 100px; /* 少し小さめに */
            height: 100px;
            z-index: 10;
            cursor: pointer;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.7)) brightness(0.9); /* 少し暗めにして馴染ませる */
            transition: all 0.5s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; /* 最初は隠す */
        }
        .kobito img { width: 100%; height: 100%; object-fit: contain; }

        /* UI */
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        .counter { position: absolute; top: 20px; right: 20px; background: rgba(58, 90, 64, 0.7); 
                   padding: 8px 15px; border-radius: 20px; border: 1px solid #dad7cd; font-size: 0.9rem; pointer-events: auto; }
        .btn-encyclopedia { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
                            background: rgba(58, 90, 64, 0.8); color: #dad7cd; border: 1px solid #dad7cd; 
                            padding: 10px 25px; border-radius: 50px; pointer-events: auto; }

        /* 図鑑 */
        #encyclopedia { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                        background: rgba(13, 26, 13, 0.98); z-index: 100; padding: 40px 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .k-card { background: #1a2e1a; border-radius: 10px; padding: 10px; text-align: center; filter: grayscale(1); opacity: 0.3; }
        .k-card.found { filter: grayscale(0); opacity: 1; border: 1px solid #dad7cd; }
        .k-card img { width: 60px; height: 60px; object-fit: contain; }

        /* 出現アニメーション：端から覗く */
        @keyframes peek-bottom { 0% { transform: translateY(100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes peek-left { 0% { transform: translateX(-100%); opacity: 0; } 100% { transform: translateX(-20%); opacity: 1; } }
        @keyframes peek-right { 0% { transform: translateX(100%); opacity: 0; } 100% { transform: translateX(20%); opacity: 1; } }
    </style>
</head>
<body>
    <div id="video-container"><video id="camera" autoplay playsinline muted></video></div>
    <div id="overlay"></div>
    <div id="ui-layer">
        <div class="counter">発見: <span id="count">0</span></div>
        <button class="btn-encyclopedia" onclick="openEnc()">こびと図鑑</button>
    </div>
    <div id="encyclopedia">
        <div onclick="closeEnc()" style="float:right; font-size: 2rem;">×</div>
        <h2 style="text-align: center;">こびと図鑑</h2>
        <div class="grid" id="grid"></div>
    </div>

    <script>
        const kobitoData = [
            { id: 1, name: "カクレモモジリ?", img: "IMG_4993.png" },
            { id: 2, name: "コビトA", img: "IMG_4996.png" },
            { id: 3, name: "コビトB", img: "IMG_4997.png" },
            { id: 4, name: "コビトC", img: "IMG_5001.png" },
            { id: 5, name: "コビトD", img: "IMG_5002.png" }
        ];

        let foundIds = new Set();
        const video = document.getElementById('camera');

        async function setup() {
            const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
            video.srcObject = s;
            initGrid();
            setTimeout(spawn, 3000);
        }

        function initGrid() {
            document.getElementById('grid').innerHTML = kobitoData.map(k => 
                `<div class="k-card" id="card-${k.id}"><img src="${k.img}"><div style="font-size:0.7rem">${k.name}</div></div>`).join('');
        }

        function spawn() {
            const data = kobitoData[Math.floor(Math.random() * kobitoData.length)];
            const el = document.createElement('div');
            el.className = 'kobito';
            el.innerHTML = `<img src="${data.img}">`;
            
            const side = Math.floor(Math.random() * 3); // 0:下, 1:左, 2:右
            if(side === 0) {
                el.style.bottom = '0'; el.style.left = Math.random() * 60 + 20 + '%';
                el.style.animation = 'peek-bottom 1.5s forwards';
            } else if(side === 1) {
                el.style.top = Math.random() * 60 + 20 + '%'; el.style.left = '0';
                el.style.animation = 'peek-left 1.5s forwards';
            } else {
                el.style.top = Math.random() * 60 + 20 + '%'; el.style.right = '0';
                el.style.animation = 'peek-right 1.5s forwards';
            }

            el.onclick = () => {
                if(!foundIds.has(data.id)) {
                    foundIds.add(data.id);
                    document.getElementById('count').innerText = foundIds.size;
                    document.getElementById(`card-${data.id}`).classList.add('found');
                }
                el.style.opacity = '0';
                setTimeout(() => { el.remove(); spawn(); }, 1000);
            };
            document.body.appendChild(el);

            // 10秒放置すると勝手にいなくなる
            setTimeout(() => { if(el.parentNode) { el.style.opacity = '0'; setTimeout(()=>el.remove(), 1000); setTimeout(spawn, 5000); } }, 10000);
        }

        function openEnc() { document.getElementById('encyclopedia').style.display='block'; }
        function closeEnc() { document.getElementById('encyclopedia').style.display='none'; }
        setup();
    </script>
</body>
</html>
